name: Bug Report
description: Report a bug or issue with the MCP server
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
  
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug
    validations:
      required: true
  
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Configure MCP server with '...'
        2. Call tool '...'
        3. See error
    validations:
      required: true
  
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true
  
  - type: input
    id: tool
    attributes:
      label: Tool Name
      description: Which MCP tool is affected? (e.g., lol_get_match_details)
  
  - type: input
    id: region
    attributes:
      label: Region
      description: Which region were you querying? (e.g., euw, na, kr)
  
  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Messages
      description: Any relevant logs or error messages
      render: shell
  
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of lol-mcp-server are you using?
    validations:
      required: true
  
  - type: input
    id: node
    attributes:
      label: Node.js Version
      description: What version of Node.js are you running?
    validations:
      required: true
